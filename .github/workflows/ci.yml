name: CI smoke test

# Runs the smoke test (each scraper with --limit 2) on every push to main
# and on every pull request. Catches the obvious regressions -- a scraper
# that no longer launches, a site whose structure shifted, a Python
# syntax error -- without waiting for a full scrape.
#
# Also triggerable manually from the Actions tab via the "Run workflow"
# button (workflow_dispatch).
#
# Expected runtime: 3--5 minutes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        # --with-deps installs the OS-level libraries Chromium needs on
        # Ubuntu. Only needed for the todaytix and londontheatre scrapers.
        run: playwright install --with-deps chromium

      - name: Run smoke test
        run: python smoke_test.py

      - name: Upload smoke outputs (on failure only)
        # If the smoke test fails, attach whatever JSON it managed to
        # write so we can inspect what went wrong without re-running.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-outputs
          path: data/smoke/
          if-no-files-found: ignore
          retention-days: 7