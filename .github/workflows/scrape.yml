name: Full scrape

# Two modes in one workflow, sharing dedupe + publish:
#
#   * FULL mode — runs every scraper from scratch, dedupes, commits
#     unified.json. Slow (~3-6 minutes). Trigger: manual only, either
#     from the Actions tab ("Run workflow" button) or via the GitHub
#     REST API workflow_dispatch endpoint (what external schedulers
#     like cron-job.org call). This is the original behaviour of this
#     workflow.
#
#   * AVAILABILITY mode — downloads the per-source artifact from the
#     latest FULL run, re-probes each source's per-perf availability
#     endpoints (olt_availability.py, ttd_availability.py,
#     lovetheatre_availability.py, todaytix_availability.py), re-runs
#     dedupe, commits a patched unified.json. Fast (~1-3 minutes
#     depending on TodayTix inclusion). Trigger: cron every 30 minutes,
#     plus manual via the same dispatch UI with mode=availability.
#
# Why one workflow instead of two
# -------------------------------
# Dedupe + publish are identical in both modes. Splitting would mean
# duplicating that logic or factoring it into a reusable workflow — both
# add maintenance overhead for a single shared site that publishes one
# JSON file. The cost of integration is one extra `setup` job and an
# `if:` clause on each downstream job; the cost of duplication is two
# files in lockstep forever.
#
# Why availability mode exists
# ----------------------------
# Booking sites pull a performance from sale 30-120 minutes before the
# door, and tight cheapest-tier inventory can sell out at any time.
# Without periodic refresh, unified.json keeps advertising performances
# whose booking pages have closed. The 22 May 2026 14:00 *Cursed Child*
# matinee was the canonical case: all four sources reported available
# at scrape time, all four were 404 / "No seats" / removed-from-calendar
# by the 14:00 box-office cutoff.
#
# About OLT: officiallondontheatre.com 403s requests from cloud IP
# ranges (Azure / GitHub Actions) on every URL, HTML and wp-json API
# alike. We route the scraper through a Cloudflare Worker reverse
# proxy deployed under the user's CF account -- not in the blocked
# range -- which rewrites the path onto the OLT origin and forwards
# the response. Auth is a shared secret (X-Proxy-Auth header).
# Credentials live in the OLT_PROXY_URL / OLT_PROXY_TOKEN repository
# secrets and are exposed to the scraper steps below. If the
# proxy ever goes down or the secrets are missing, flip skip_olt to
# 'true' to keep cloud runs green and fall back to running OLT
# locally with `python scraper/olt_scraper.py`.
#
# What's committed vs not:
#   * public/data/unified.json (~35MB) is committed -- it's what the
#     website reads.
#   * Per-source raw JSONs (~130MB total) are NOT committed -- they
#     exist only as the `all-scrapers` GitHub Actions artifact with
#     30-day retention, for debugging AND as the input to availability-
#     mode runs.
#   * report.txt and review.json from dedupe are in the `unified-shows`
#     artifact (same 30-day retention) and not committed.

on:
  schedule:
    # Availability-mode refresh, every 30 minutes. The cron expression
    # is the discriminator: setup-job sees event_name == "schedule" and
    # forces mode=availability. GitHub Actions cron can drift by a few
    # minutes under load — don't depend on this hitting the wall clock
    # exactly. Scheduled workflows only run on the default branch and
    # only if the repo has had activity in the last 60 days.
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: 'full = scrape from scratch (slow); availability = refresh from latest full run (fast)'
        required: false
        default: 'full'
        type: choice
        options:
          - 'full'
          - 'availability'
      # ----- full-mode inputs (ignored in availability mode) -----
      limit:
        description: '[full] Per-scraper limit (leave empty for full scrape)'
        required: false
        default: ''
      skip_browser:
        description: '[full] Skip the Playwright scraper (todaytix)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_olt:
        description: '[full] Skip OLT (set true only if the Cloudflare Worker proxy is down or its secrets are missing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      drop_ghost_listings:
        description: '[full] Drop dedupe clusters with 0 performances (stale/announced-only shows)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      # ----- availability-mode inputs (ignored in full mode) -----
      within_days:
        description: '[availability] Refresh perfs within N days of today'
        required: false
        default: '2'
      skip_todaytix_avail:
        description: '[availability] Skip TodayTix availability (Playwright; slower)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      # ----- shared input -----
      skip_publish:
        description: 'Skip committing the unified output (artifacts still uploaded)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# `actions: read` lets the availability_refresh job download artifacts
# from a previous run of this workflow. `contents: write` is for the
# publish step.
permissions:
  contents: write
  actions: read

# A FULL scrape and an AVAILABILITY refresh both end with a commit to
# main; back-to-back commits would race. Serialise everything through
# one concurrency group. `cancel-in-progress: false` means a queued
# availability refresh waits for an in-flight full scrape to finish
# rather than being cancelled (cancelling would lose the refresh entirely).
concurrency:
  group: scrape-and-refresh
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------
  # setup: pick the mode and expose it as an output every other job
  # branches on. Cron fires → availability; everything else uses the
  # workflow_dispatch input (default: full).
  # ---------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      mode: ${{ steps.pick.outputs.mode }}
    steps:
      - name: Pick mode
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MODE="availability"
          else
            MODE="${{ inputs.mode || 'full' }}"
          fi
          echo "Selected mode: $MODE  (event=${{ github.event_name }})"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

  # =====================================================================
  # FULL MODE: scrape → combine
  # =====================================================================
  scrape:
    needs: setup
    if: needs.setup.outputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false   # one scraper failing shouldn't cancel the rest
      matrix:
        include:
          - { name: todaytix,            script: scraper/todaytix_scraper.py,            playwright: true }
          - { name: olt,                 script: scraper/olt_scraper.py,                 playwright: false }
          - { name: lovetheatre,         script: scraper/lovetheatre_scraper.py,         playwright: false }
          - { name: seatplan,            script: scraper/seatplan_scraper.py,            playwright: false }
          - { name: londontheatredirect, script: scraper/londontheatredirect_scraper.py, playwright: false }
          - { name: ttd,                 script: scraper/ttd_scraper.py,                 playwright: false }

    steps:
      - name: Gate
        id: gate
        run: |
          RUN="true"
          if [ "${{ inputs.skip_browser }}" = "true" ] && [ "${{ matrix.playwright }}" = "true" ]; then
            echo "skip_browser=true and ${{ matrix.name }} needs a browser -- skipping."
            RUN="false"
          fi
          if [ "${{ inputs.skip_olt }}" = "true" ] && [ "${{ matrix.name }}" = "olt" ]; then
            echo "skip_olt=true -- skipping olt."
            RUN="false"
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - name: Check out repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Chromium
        if: steps.gate.outputs.run == 'true' && matrix.playwright
        run: playwright install --with-deps chromium

      - name: Run scraper
        if: steps.gate.outputs.run == 'true'
        env:
          OLT_PROXY_URL: ${{ secrets.OLT_PROXY_URL }}
          OLT_PROXY_TOKEN: ${{ secrets.OLT_PROXY_TOKEN }}
        # Exit code policy (matches smoke_test.py):
        #   0 = clean
        #   2 = scraper wrote output, but flagged warnings (still success)
        #   anything else = hard failure
        run: |
          mkdir -p scraper/data
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="--limit ${{ inputs.limit }}"
          fi
          set +e
          python ${{ matrix.script }} $ARGS --out scraper/data/${{ matrix.name }}.json
          EXIT=$?
          set -e
          echo "Scraper exit code: $EXIT"
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::error::${{ matrix.name }} failed with exit code $EXIT"
            exit "$EXIT"
          fi

      - name: Verify output file
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -f "scraper/data/${{ matrix.name }}.json" ]; then
            echo "::error::${{ matrix.name }} did not produce an output file"
            exit 1
          fi
          python -c "
          import json, sys
          d = json.load(open('scraper/data/${{ matrix.name }}.json'))
          perfs = d.get('performance_count') or d.get('showtime_count') or 0
          warns = len((d.get('report') or {}).get('warnings') or [])
          fails = len((d.get('report') or {}).get('failures') or [])
          print(f'shows={d.get(\"show_count\")} perfs={perfs} warnings={warns} failures={fails}')
          "

      - name: Upload per-scraper artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-output
          path: scraper/data/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 30

  combine:
    needs: [setup, scrape]
    if: always() && needs.setup.outputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all per-scraper artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/
          merge-multiple: true
          pattern: '*-output'

      - name: List what we got
        run: ls -la data/ || true

      - name: Upload combined artifact
        # This is the canonical "raw per-source files from a full scrape"
        # artifact. Availability-mode runs of THIS workflow look for the
        # latest run that produced one of these (filtered to
        # event != "schedule") and use it as their input.
        uses: actions/upload-artifact@v4
        with:
          name: all-scrapers
          path: data/
          if-no-files-found: error
          retention-days: 30

  # =====================================================================
  # AVAILABILITY MODE: download latest full-scrape artifact, re-probe,
  # re-upload. The output artifact gets a different name so dedupe knows
  # which one to pull.
  # =====================================================================
  availability_refresh:
    needs: setup
    if: needs.setup.outputs.mode == 'availability'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo (for the availability scripts)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      # ------------------------------------------------------------------
      # Find the most recent FULL-mode run and download its all-scrapers.
      # Heuristic: filter `gh run list` to event != "schedule", since
      # scheduled runs always execute in availability mode (per the
      # setup job above). A manual workflow_dispatch with mode=availability
      # would slip past this filter — but the availability scripts are
      # idempotent against an already-patched file, so the worst case is
      # benign (we re-patch the same data).
      # ------------------------------------------------------------------
      - name: Find latest full-mode run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Pull up to 30 successful runs and pick the first whose event
          # isn't a schedule. 30 is generous — a full scrape happens at
          # least daily in practice.
          RUN_ID=$(gh run list \
            --workflow=scrape.yml \
            --status=success \
            --limit=30 \
            --json databaseId,event \
            --jq 'map(select(.event != "schedule")) | .[0].databaseId')
          if [ -z "${RUN_ID:-}" ] || [ "$RUN_ID" = "null" ]; then
            echo "::error::No successful full-mode run found in the last 30 successful runs of scrape.yml. Trigger a full run before scheduling availability."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Using full-mode artifacts from run $RUN_ID"

      - name: Download per-source JSONs (all-scrapers from prior full run)
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers
          path: data/
          run-id: ${{ steps.find_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: List downloaded source files
        run: |
          ls -la data/ || true
          for f in data/*.json; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f")
              echo "  $f ($size bytes)"
            fi
          done

      # ------------------------------------------------------------------
      # Per-source availability re-probes. Each step is independent and
      # gated on the source file's presence (some full runs skip OLT via
      # the skip_olt input). Soft-failure: a 1- or 2-exit from any one
      # script logs a warning but doesn't abort — dedupe will still run
      # with the partially-refreshed data.
      # ------------------------------------------------------------------

      - name: Refresh OLT availability
        if: hashFiles('data/olt.json') != ''
        env:
          OLT_PROXY_URL: ${{ secrets.OLT_PROXY_URL }}
          OLT_PROXY_TOKEN: ${{ secrets.OLT_PROXY_TOKEN }}
        run: |
          WITHIN="${{ inputs.within_days || '2' }}"
          set +e
          python scraper/olt_availability.py \
            --in data/olt.json \
            --within-days "$WITHIN" \
            --concurrency 8
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::warning::olt_availability hard-failed (exit $EXIT); proceeding with the unrefreshed olt.json"
          fi

      - name: Refresh TTD availability
        if: hashFiles('data/ttd.json') != ''
        run: |
          set +e
          python scraper/ttd_availability.py \
            --in data/ttd.json \
            --concurrency 8
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::warning::ttd_availability hard-failed (exit $EXIT); proceeding with the unrefreshed ttd.json"
          fi

      - name: Refresh LoveTheatre availability
        if: hashFiles('data/lovetheatre.json') != ''
        run: |
          WITHIN="${{ inputs.within_days || '2' }}"
          set +e
          python scraper/lovetheatre_availability.py \
            --in data/lovetheatre.json \
            --within-days "$WITHIN" \
            --concurrency 8
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::warning::lovetheatre_availability hard-failed (exit $EXIT); proceeding with the unrefreshed lovetheatre.json"
          fi

      - name: Install Playwright (for TodayTix)
        if: hashFiles('data/todaytix.json') != '' && inputs.skip_todaytix_avail != 'true'
        run: playwright install --with-deps chromium

      - name: Refresh TodayTix availability
        if: hashFiles('data/todaytix.json') != '' && inputs.skip_todaytix_avail != 'true'
        run: |
          WITHIN="${{ inputs.within_days || '2' }}"
          set +e
          python scraper/todaytix_availability.py \
            --in data/todaytix.json \
            --window-days "$WITHIN" \
            --workers 2
          EXIT=$?
          set -e
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::warning::todaytix_availability hard-failed (exit $EXIT); proceeding with the unrefreshed todaytix.json"
          fi

      - name: Upload patched per-source files
        # Different name from full-mode's "all-scrapers" so dedupe knows
        # which to pull. Don't overwrite "all-scrapers" — that would
        # invalidate the historical-marker filter the NEXT availability
        # run uses to find a full-mode baseline.
        uses: actions/upload-artifact@v4
        with:
          name: all-scrapers-patched
          path: data/
          if-no-files-found: error
          retention-days: 7

  # =====================================================================
  # SHARED: dedupe + publish, run after EITHER combine or
  # availability_refresh.
  # =====================================================================
  dedupe:
    needs: [setup, combine, availability_refresh]
    # `always()` is needed so this job runs when one of its `needs` was
    # skipped (the inactive mode's job). The explicit success check on
    # whichever job DID run is what gates execution.
    if: always() && ((needs.setup.outputs.mode == 'full' && needs.combine.result == 'success') || (needs.setup.outputs.mode == 'availability' && needs.availability_refresh.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dedupe dependencies
        run: pip install rapidfuzz pyyaml

      - name: Download per-source files (full mode)
        if: needs.setup.outputs.mode == 'full'
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers
          path: data/

      - name: Download per-source files (availability mode)
        if: needs.setup.outputs.mode == 'availability'
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers-patched
          path: data/

      - name: Sanity-check inputs
        run: |
          ls -la data/
          n=$(ls data/*.json 2>/dev/null | wc -l)
          echo "Source JSON files present: $n"
          if [ "$n" -lt 2 ]; then
            echo "::warning::only $n source file(s) -- dedupe will produce mostly singletons"
          fi

      - name: Run dedupe
        run: |
          mkdir -p dedupe_output
          OVERRIDES=""
          if [ -f scraper/analysis/overrides.yaml ]; then
            OVERRIDES="--overrides scraper/analysis/overrides.yaml"
          elif [ -f scraper/analysis/overrides.json ]; then
            OVERRIDES="--overrides scraper/analysis/overrides.json"
          fi
          # drop_ghost_listings only meaningful in full mode (no scraper
          # adds new shows in availability mode). Still safe to honour
          # the input value if set, but it'll be 'false' on cron-fired
          # runs since cron can't supply inputs.
          MIN_PERFS=""
          if [ "${{ inputs.drop_ghost_listings }}" = "true" ]; then
            MIN_PERFS="--min-performances 1"
          fi
          python scraper/analysis/dedupe.py data/ --out dedupe_output $OVERRIDES $MIN_PERFS

      - name: Summarise result
        run: |
          python -c "
          import json
          with open('dedupe_output/unified.json') as f:
              u = json.load(f)
          print(f\"shows={u['show_count']}  performances={u['performance_count']}\")
          dist = u.get('coverage_distribution', {})
          for n in sorted(dist.keys(), key=int, reverse=True):
              print(f'  {n} sources: {dist[n]} shows')
          stages = u.get('stages', {})
          rescues = stages.get('stage_4_orphan_rescues', [])
          attached = sum(1 for r in rescues if r.get('status') == 'attached')
          print(f\"Stage 3 fuzzy auto-merges:    {len(stages.get('stage_3_fuzzy_merges', []))}\")
          print(f\"Stage 4 orphans attached:     {attached}\")
          print(f\"Stage 5 overrides applied:    {len(stages.get('stage_5_overrides_applied', []))}\")
          "

      - name: Upload unified-shows artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-shows
          path: dedupe_output/
          if-no-files-found: error
          retention-days: 30

  publish:
    # Commit the unified.json to main. CF Pages picks up the commit and
    # rebuilds the site with the fresh data baked in.
    needs: [setup, dedupe]
    if: always() && needs.dedupe.result == 'success' && inputs.skip_publish != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Download unified output
        uses: actions/download-artifact@v4
        with:
          name: unified-shows
          path: dedupe_output/

      - name: Copy unified.json into public/data/
        # Only unified.json is committed -- report.txt and review.json
        # stay as workflow artifacts. The website reads exactly one file.
        run: |
          mkdir -p public/data
          cp dedupe_output/unified.json public/data/unified.json
          ls -la public/data/

      - name: Commit and push to main
        run: |
          MODE="${{ needs.setup.outputs.mode }}"
          if [ "$MODE" = "availability" ]; then
            MSG="data: availability refresh ($(date -u +%Y-%m-%dT%H:%MZ))"
          else
            MSG="data: refresh from full scrape ($(date -u +%Y-%m-%dT%H:%MZ))"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/unified.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "$MSG"
          # Race protection: a parallel full-scrape may have committed
          # while we were running. Rebase rather than force-push so we
          # don't clobber a fresher unified.json.
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
