name: Full scrape

# Runs every scraper at full size, deduplicates across sources into a
# unified catalogue, and commits the result to `public/data/unified.json`
# on main. Cloudflare Pages rebuilds on the commit and the new data ships
# with the next deploy.
#
# Trigger: manual only -- either from the Actions tab ("Run workflow"
# button) or via the GitHub REST API workflow_dispatch endpoint, which
# is what external schedulers like cron-job.org call.
#
# Strategy: each scraper runs in its own parallel job (matrix). One
# failure doesn't stop the others. After all jobs finish, a `combine` job
# downloads the per-scraper artifacts and re-uploads them as a single
# "all-scrapers" artifact. A `dedupe` job then consolidates across
# sources into a "unified-shows" artifact. Finally, a `publish` job
# commits the unified.json to main.
#
# About OLT: officiallondontheatre.com 403s requests from cloud IP
# ranges (Azure / GitHub Actions) on every URL, HTML and wp-json API
# alike. We route the scraper through a Cloudflare Worker reverse
# proxy deployed under the user's CF account -- not in the blocked
# range -- which rewrites the path onto the OLT origin and forwards
# the response. Auth is a shared secret (X-Proxy-Auth header).
# Credentials live in the OLT_PROXY_URL / OLT_PROXY_TOKEN repository
# secrets and are exposed to the "Run scraper" step below. If the
# proxy ever goes down or the secrets are missing, flip skip_olt to
# 'true' to keep cloud runs green and fall back to running OLT
# locally with `python scraper/olt_scraper.py`.
#
# Expected runtime: ~3-6 minutes total (parallel scrape, ~30s combine,
# ~1 min dedupe, ~30s publish). The Playwright-driven scraper
# (todaytix) is the long pole.
#
# What's committed vs not:
#   * public/data/unified.json (~35MB) is committed -- it's what the
#     website reads.
#   * Per-source raw JSONs (~130MB total) are NOT committed -- they
#     exist only as the `all-scrapers` GitHub Actions artifact with
#     30-day retention, for debugging.
#   * report.txt and review.json from dedupe are in the `unified-shows`
#     artifact (same 30-day retention) and not committed.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Per-scraper limit (leave empty for full scrape)'
        required: false
        default: ''
      skip_browser:
        description: 'Skip the Playwright scraper (todaytix)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_olt:
        description: 'Skip OLT (set true only if the Cloudflare Worker proxy is down or its secrets are missing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      drop_ghost_listings:
        description: 'Drop dedupe clusters with 0 performances (stale/announced-only shows)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_publish:
        description: 'Skip committing the unified output (artifacts still uploaded)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false   # one scraper failing shouldn't cancel the rest
      matrix:
        include:
          - { name: todaytix,            script: scraper/todaytix_scraper.py,            playwright: true }
          - { name: olt,                 script: scraper/olt_scraper.py,                 playwright: false }
          - { name: lovetheatre,         script: scraper/lovetheatre_scraper.py,         playwright: false }
          - { name: seatplan,            script: scraper/seatplan_scraper.py,            playwright: false }
          - { name: ttd,                 script: scraper/ttd_scraper.py,                 playwright: false }

    steps:
      - name: Gate
        id: gate
        run: |
          RUN="true"
          if [ "${{ inputs.skip_browser }}" = "true" ] && [ "${{ matrix.playwright }}" = "true" ]; then
            echo "skip_browser=true and ${{ matrix.name }} needs a browser -- skipping."
            RUN="false"
          fi
          if [ "${{ inputs.skip_olt }}" = "true" ] && [ "${{ matrix.name }}" = "olt" ]; then
            echo "skip_olt=true -- skipping olt."
            RUN="false"
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - name: Check out repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright Chromium
        if: steps.gate.outputs.run == 'true' && matrix.playwright
        run: playwright install --with-deps chromium

      - name: Run scraper
        if: steps.gate.outputs.run == 'true'
        env:
          OLT_PROXY_URL: ${{ secrets.OLT_PROXY_URL }}
          OLT_PROXY_TOKEN: ${{ secrets.OLT_PROXY_TOKEN }}
        # Exit code policy (matches smoke_test.py):
        #   0 = clean
        #   2 = scraper wrote output, but flagged warnings (still success)
        #   anything else = hard failure
        run: |
          mkdir -p scraper/data
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="--limit ${{ inputs.limit }}"
          fi
          set +e
          python ${{ matrix.script }} $ARGS --out scraper/data/${{ matrix.name }}.json
          EXIT=$?
          set -e
          echo "Scraper exit code: $EXIT"
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::error::${{ matrix.name }} failed with exit code $EXIT"
            exit "$EXIT"
          fi

      - name: Verify output file
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -f "scraper/data/${{ matrix.name }}.json" ]; then
            echo "::error::${{ matrix.name }} did not produce an output file"
            exit 1
          fi
          python -c "
          import json, sys
          d = json.load(open('scraper/data/${{ matrix.name }}.json'))
          perfs = d.get('performance_count') or d.get('showtime_count') or 0
          warns = len((d.get('report') or {}).get('warnings') or [])
          fails = len((d.get('report') or {}).get('failures') or [])
          print(f'shows={d.get(\"show_count\")} perfs={perfs} warnings={warns} failures={fails}')
          "

      - name: Upload per-scraper artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-output
          path: scraper/data/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 30

  combine:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all per-scraper artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/
          merge-multiple: true
          pattern: '*-output'

      - name: List what we got
        run: ls -la data/ || true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-scrapers
          path: data/
          if-no-files-found: error
          retention-days: 30

  dedupe:
    needs: combine
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dedupe dependencies
        run: pip install rapidfuzz pyyaml

      - name: Download combined scrapers artifact
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers
          path: data/

      - name: Sanity-check inputs
        run: |
          ls -la data/
          n=$(ls data/*.json 2>/dev/null | wc -l)
          echo "Source JSON files present: $n"
          if [ "$n" -lt 2 ]; then
            echo "::warning::only $n source file(s) -- dedupe will produce mostly singletons"
          fi

      - name: Run dedupe
        run: |
          mkdir -p dedupe_output
          OVERRIDES=""
          if [ -f scraper/analysis/overrides.yaml ]; then
            OVERRIDES="--overrides scraper/analysis/overrides.yaml"
          elif [ -f scraper/analysis/overrides.json ]; then
            OVERRIDES="--overrides scraper/analysis/overrides.json"
          fi
          MIN_PERFS=""
          if [ "${{ inputs.drop_ghost_listings }}" = "true" ]; then
            MIN_PERFS="--min-performances 1"
          fi
          python scraper/analysis/dedupe.py data/ --out dedupe_output $OVERRIDES $MIN_PERFS

      - name: Summarise result
        run: |
          python -c "
          import json
          with open('dedupe_output/unified.json') as f:
              u = json.load(f)
          print(f\"shows={u['show_count']}  performances={u['performance_count']}\")
          dist = u.get('coverage_distribution', {})
          for n in sorted(dist.keys(), key=int, reverse=True):
              print(f'  {n} sources: {dist[n]} shows')
          stages = u.get('stages', {})
          rescues = stages.get('stage_4_orphan_rescues', [])
          attached = sum(1 for r in rescues if r.get('status') == 'attached')
          print(f\"Stage 3 fuzzy auto-merges:    {len(stages.get('stage_3_fuzzy_merges', []))}\")
          print(f\"Stage 4 orphans attached:     {attached}\")
          print(f\"Stage 5 overrides applied:    {len(stages.get('stage_5_overrides_applied', []))}\")
          "

      - name: Upload unified-shows artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-shows
          path: dedupe_output/
          if-no-files-found: error
          retention-days: 30

  publish:
    # Commit the unified.json to main. CF Pages picks up the commit and
    # rebuilds the site with the fresh data baked in.
    needs: dedupe
    if: always() && inputs.skip_publish != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Download unified output
        uses: actions/download-artifact@v4
        with:
          name: unified-shows
          path: dedupe_output/

      - name: Copy unified.json into public/data/
        # Only unified.json is committed -- report.txt and review.json
        # stay as workflow artifacts. The website reads exactly one file.
        run: |
          mkdir -p public/data
          cp dedupe_output/unified.json public/data/unified.json
          ls -la public/data/

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/unified.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "data: refresh from full scrape ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
