name: Full scrape

# Runs every scraper at full size, uploads each scraper's JSON, combines
# them into one all-scrapers artifact, deduplicates across sources into
# a unified-shows artifact, then force-pushes everything to a dedicated
# `data` branch as a single commit so the website can consume the JSON
# via stable raw.githubusercontent.com URLs without bloating main.
#
# Trigger: manual only -- either from the Actions tab ("Run workflow"
# button) or via the GitHub REST API workflow_dispatch endpoint, which
# is what external schedulers like cron-job.org call.
#
# Strategy: each scraper runs in its own parallel job (matrix). One
# failure doesn't stop the others. After all jobs finish, a `combine` job
# downloads the per-scraper artifacts and re-uploads them as a single
# "all-scrapers" artifact. A `dedupe` job then consolidates across
# sources into a "unified-shows" artifact. Finally, a `publish` job
# force-pushes both artifact sets to the `data` branch.
#
# About OLT: officiallondontheatre.com 403s requests from cloud IP
# ranges (Azure / GitHub Actions) on every URL, HTML and wp-json API
# alike. We route the scraper through a Cloudflare Worker reverse
# proxy deployed under the user's CF account -- not in the blocked
# range -- which rewrites the path onto the OLT origin and forwards
# the response. Auth is a shared secret (X-Proxy-Auth header).
# Credentials live in the OLT_PROXY_URL / OLT_PROXY_TOKEN repository
# secrets and are exposed to the "Run scraper" step below. If the
# proxy ever goes down or the secrets are missing, flip skip_olt to
# 'true' to keep cloud runs green and fall back to running OLT
# locally with `python olt_scraper.py`.
#
# Expected runtime: ~3-6 minutes total (parallel scrape, ~30s combine,
# ~1 min dedupe, ~30s publish). The Playwright-driven scrapers
# (todaytix, londontheatre) are now the long pole since the ttd
# async/HTTP2 rewrite brought it under 30 seconds.
#
# Why a separate `data` branch (not commits on main):
#   * Per-scrape payload is ~135MB. Committing to main meant ~135MB of
#     git history accumulated per run; over months the repo would grow
#     unboundedly.
#   * The `data` branch is force-pushed, so it always holds a single
#     commit. Repo size stays roughly constant regardless of how often
#     the workflow runs. GitHub eventually GCs the orphaned blobs from
#     prior runs.
#   * `main` stays small and readable -- it contains only code, no
#     scrape artifacts.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Per-scraper limit (leave empty for full scrape)'
        required: false
        default: ''
      skip_browser:
        description: 'Skip the two Playwright scrapers (todaytix, londontheatre)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_olt:
        description: 'Skip OLT (set true only if the Cloudflare Worker proxy is down or its secrets are missing)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      drop_ghost_listings:
        description: 'Drop dedupe clusters with 0 performances (stale/announced-only shows)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_publish:
        description: 'Skip force-pushing the data branch (artifacts still uploaded)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false   # one scraper failing shouldn't cancel the rest
      matrix:
        include:
          - { name: todaytix,            script: todaytix_scraper.py,            playwright: true }
          - { name: londontheatre,       script: londontheatre_scraper.py,       playwright: true }
          - { name: olt,                 script: olt_scraper.py,                 playwright: false }
          - { name: lovetheatre,         script: lovetheatre_scraper.py,         playwright: false }
          - { name: seatplan,            script: seatplan_scraper.py,            playwright: false }
          - { name: londontheatredirect, script: londontheatredirect_scraper.py, playwright: false }
          - { name: ttd,                 script: ttd_scraper.py,                 playwright: false }

    steps:
      # Gate: compute once whether this matrix entry should run at all,
      # based on the skip_* inputs. Subsequent steps key off the `run`
      # output to stay readable rather than duplicating the condition.
      - name: Gate
        id: gate
        run: |
          RUN="true"
          if [ "${{ inputs.skip_browser }}" = "true" ] && [ "${{ matrix.playwright }}" = "true" ]; then
            echo "skip_browser=true and ${{ matrix.name }} needs a browser -- skipping."
            RUN="false"
          fi
          if [ "${{ inputs.skip_olt }}" = "true" ] && [ "${{ matrix.name }}" = "olt" ]; then
            echo "skip_olt=true -- skipping olt."
            RUN="false"
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - name: Check out repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: steps.gate.outputs.run == 'true' && matrix.playwright
        run: playwright install --with-deps chromium

      - name: Run scraper
        if: steps.gate.outputs.run == 'true'
        # Only olt_scraper.py reads these vars; the other six scrapers
        # ignore them. We set them at step level rather than guarding
        # on matrix.name because (a) exposing unused secrets to other
        # jobs is harmless -- they just sit in the environment -- and
        # (b) the alternative (per-entry matrix env) would complicate
        # the matrix definition for zero functional gain.
        env:
          OLT_PROXY_URL: ${{ secrets.OLT_PROXY_URL }}
          OLT_PROXY_TOKEN: ${{ secrets.OLT_PROXY_TOKEN }}
        # Exit code policy (matches smoke_test.py):
        #   0 = clean
        #   2 = scraper wrote output, but flagged warnings (still success)
        #   anything else = hard failure
        run: |
          mkdir -p data
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="--limit ${{ inputs.limit }}"
          fi
          set +e
          python ${{ matrix.script }} $ARGS --out data/${{ matrix.name }}.json
          EXIT=$?
          set -e
          echo "Scraper exit code: $EXIT"
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 2 ]; then
            echo "::error::${{ matrix.name }} failed with exit code $EXIT"
            exit "$EXIT"
          fi

      - name: Verify output file
        if: steps.gate.outputs.run == 'true'
        run: |
          if [ ! -f "data/${{ matrix.name }}.json" ]; then
            echo "::error::${{ matrix.name }} did not produce an output file"
            exit 1
          fi
          python -c "
          import json, sys
          d = json.load(open('data/${{ matrix.name }}.json'))
          perfs = d.get('performance_count') or d.get('showtime_count') or 0
          warns = len((d.get('report') or {}).get('warnings') or [])
          fails = len((d.get('report') or {}).get('failures') or [])
          print(f'shows={d.get(\"show_count\")} perfs={perfs} warnings={warns} failures={fails}')
          "

      - name: Upload per-scraper artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-output
          path: data/${{ matrix.name }}.json
          if-no-files-found: error
          retention-days: 30

  combine:
    # Merge all per-scraper artifacts into one "all-scrapers" artifact
    # so the user can grab everything with a single download.
    needs: scrape
    if: always()                # combine whatever succeeded, even if some failed
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download all per-scraper artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/
          merge-multiple: true   # flatten *-output/file.json into data/file.json
          pattern: '*-output'

      - name: List what we got
        run: ls -la data/ || true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-scrapers
          path: data/
          if-no-files-found: error
          retention-days: 30

  dedupe:
    # Consolidate per-source shows into one canonical list using the
    # 5-stage pipeline:
    #   1+2  Normalize titles/venues + apply VENUE_ALIASES registry
    #   3    Fuzzy match within venues (within-source-dup guard active)
    #   4    Orphan rescue (title-only attach for records missing venue;
    #         ambiguity guard refuses multi-match cases)
    #   5    Manual overrides from analysis/overrides.yaml (if present)
    #
    # Independently re-runnable against past scrapes by downloading the
    # all-scrapers artifact locally and running:
    #   python analysis/dedupe.py path/to/all-scrapers/ --overrides analysis/overrides.yaml
    needs: combine
    if: always()                # dedupe whatever survived earlier failures
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dedupe dependencies
        # rapidfuzz dramatically improves Stage 3+4 quality and speed (the
        # stdlib difflib fallback works but is significantly slower);
        # pyyaml is only used if an overrides file in YAML form exists.
        run: pip install rapidfuzz pyyaml

      - name: Download combined scrapers artifact
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers
          path: data/

      - name: Sanity-check inputs
        run: |
          ls -la data/
          n=$(ls data/*.json 2>/dev/null | wc -l)
          echo "Source JSON files present: $n"
          if [ "$n" -lt 2 ]; then
            echo "::warning::only $n source file(s) -- dedupe will produce mostly singletons"
          fi

      - name: Run dedupe
        # Picks up analysis/overrides.yaml (or .json fallback) if present.
        # --min-performances 1 toggled by the drop_ghost_listings input --
        # drops clusters with 0 performances (stale "ghost" listings like
        # todaytix's Miss Saigon page that never got delisted after the
        # run ended, or lovetheatre touring listings without current dates).
        run: |
          mkdir -p dedupe_output
          OVERRIDES=""
          if [ -f analysis/overrides.yaml ]; then
            OVERRIDES="--overrides analysis/overrides.yaml"
          elif [ -f analysis/overrides.json ]; then
            OVERRIDES="--overrides analysis/overrides.json"
          fi
          MIN_PERFS=""
          if [ "${{ inputs.drop_ghost_listings }}" = "true" ]; then
            MIN_PERFS="--min-performances 1"
          fi
          python analysis/dedupe.py data/ --out dedupe_output $OVERRIDES $MIN_PERFS

      - name: Summarise result
        # Surface the headline numbers in the run log so you can spot
        # regressions at a glance without downloading the artifact.
        run: |
          python -c "
          import json
          with open('dedupe_output/unified.json') as f:
              u = json.load(f)
          print(f\"shows={u['show_count']}  performances={u['performance_count']}\")
          dist = u.get('coverage_distribution', {})
          for n in sorted(dist.keys(), key=int, reverse=True):
              print(f'  {n} sources: {dist[n]} shows')
          stages = u.get('stages', {})
          rescues = stages.get('stage_4_orphan_rescues', [])
          attached = sum(1 for r in rescues if r.get('status') == 'attached')
          print(f\"Stage 3 fuzzy auto-merges:    {len(stages.get('stage_3_fuzzy_merges', []))}\")
          print(f\"Stage 4 orphans attached:     {attached}\")
          print(f\"Stage 5 overrides applied:    {len(stages.get('stage_5_overrides_applied', []))}\")
          "

      - name: Upload unified-shows artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-shows
          path: dedupe_output/
          if-no-files-found: error
          retention-days: 30

  publish:
    # Force-push the latest scrape data to the `data` branch as a
    # single commit, replacing whatever was there before. This is the
    # repo-size-friendly alternative to commit-to-main: history doesn't
    # accumulate, so the repo stays roughly constant size regardless
    # of how often the workflow runs.
    #
    # The `data` branch is decoupled from main: it contains ONLY the
    # scrape outputs (no code, no workflows), and main never references
    # it. The website reads via raw.githubusercontent.com URLs:
    #
    #   https://raw.githubusercontent.com/<owner>/<repo>/data/scrapers/<name>.json
    #   https://raw.githubusercontent.com/<owner>/<repo>/data/unified/unified.json
    #
    # Folder layout on the branch (note: at branch root, no data/ wrapper):
    #   scrapers/<name>.json    -- per-source raw outputs
    #   unified/unified.json    -- canonical consolidated catalogue
    #   unified/report.txt      -- human-readable dedupe summary
    #   unified/review.json     -- borderline merge pairs to inspect
    #
    # Permissions: GITHUB_TOKEN gets `contents: write` ONLY on this job,
    # so the previous jobs stay read-only (defense in depth -- a
    # compromised scraper step can't also push to the repo).
    #
    # If skip_publish was passed, the job exits immediately so the
    # artifacts still upload but nothing is force-pushed.
    needs: dedupe
    if: always() && inputs.skip_publish != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download per-scraper outputs
        # The combined artifact uploaded by `combine` is a flat directory
        # of <name>.json files matching the matrix entries.
        uses: actions/download-artifact@v4
        with:
          name: all-scrapers
          path: payload/scrapers/

      - name: Download unified output
        uses: actions/download-artifact@v4
        with:
          name: unified-shows
          path: payload/unified/

      - name: List what's going to the data branch
        run: |
          echo "== payload/scrapers =="
          ls -la payload/scrapers/ || true
          echo "== payload/unified =="
          ls -la payload/unified/ || true

      - name: Force-push to data branch
        # No actions/checkout: we want a brand-new single-commit branch,
        # not history extending main. We initialize a fresh repo inside
        # the payload directory, commit the downloaded artifacts as the
        # branch's sole commit, and force-push.
        #
        # Auth: the remote URL embeds GITHUB_TOKEN as basic-auth via
        # the standard `x-access-token` username. This is GitHub's
        # documented pattern for pushing from Actions without having
        # actions/checkout pre-wire the credentials.
        #
        # --force is essential: the previous run's commit is the
        # current data-branch HEAD; we're replacing it, not appending.
        # No retry on a push conflict: this workflow runs serially and
        # is the only writer to the data branch, so a conflict would
        # mean something genuinely unexpected -- worth failing loudly.
        working-directory: payload
        run: |
          git init -b data -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add .
          git commit -m "data: refresh from full scrape ($(date -u +%Y-%m-%dT%H:%MZ))" -q
          git push --force origin data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
